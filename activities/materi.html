          id="musicToggle"
          data-music-toggle
          title="Musik Hidup (Klik untuk Matikan)"
        >
          🎵

      </div>
    </div>

        <!-- MENU CARDS CONTAINER -->
        <div class="materi-cards-container">
          <!-- PENGENALAN HURUF CARD -->
          <div class="materi-card" id="cardHuruf">
            <p class="cartoon-font">Mengenal Huruf</p>
            <!-- <div class="card-description">Belajar mengenal huruf A-Z</div> -->
            <div class="card-icon">
              <img class="materi-icon" src="../images/letters1.png" alt="" />

          <div class="materi-card" id="cardBenda">
